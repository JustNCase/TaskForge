version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on: [db]

  ai:
    build: .
    ports:
      - "3003:3003"
    env_file: .env

  vision:
    build: .
    ports:
      - "3005:3005"

  integration:
    build: .
    ports:
      - "3006:3006"

  events:
    build: .
    ports:
      - "3007:3007"

  notifications:
    build: .
    ports:
      - "3008:3008"

  opportunity:
    build: .
    ports:
      - "3010:3010"

  agents:
    build: .
    ports:
      - "3011:3011"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
